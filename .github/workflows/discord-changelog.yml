name: Discord Changelog

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build and send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -e

          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SUBJECT=$(echo "$COMMIT_MSG" | head -n 1 | sed -E 's/^GITBOOK-[0-9]+:\s*//')

          # ============================================================
          # Funzione: trasforma "2.-attivita-commerciali/legge-2.10.md"
          # in       "Legge 2.10 (Attivita Commerciali)"
          # ============================================================
          format_path() {
            local path="$1"
            local name="${path%.md}"
            if [[ "$name" == *"/"* ]]; then
              local folder="${name%/*}"
              local filename="${name##*/}"
              local folder_clean
              folder_clean=$(echo "$folder" | sed -E 's|^[0-9]+\.?-?||; s|/[0-9]+\.?-?| / |g; s/-/ /g; s/\b(.)/\u\1/g')
              local file_clean
              file_clean=$(echo "$filename" | sed -E 's/-/ /g; s/\b(.)/\u\1/g')
              echo "**${file_clean}** _(${folder_clean})_"
            else
              echo "**$(echo "$name" | sed -E 's/-/ /g; s/\b(.)/\u\1/g')**"
            fi
          }

          # ============================================================
          # Verifica se un file va filtrato (boilerplate GitBook)
          # ============================================================
          is_skipped() {
            local file="$1"
            local base
            base=$(basename "$file")
            case "$base" in
              SUMMARY.md|README.md|.gitbook.yaml|.gitignore) return 0 ;;
            esac
            [[ "$file" == .* ]] && return 0
            [[ "$file" != *.md ]] && return 0
            return 1
          }

          # ============================================================
          # Recupera lista file con stato (A=added, M=modified, D=deleted, R=renamed)
          # ============================================================
          ADDED_LIST=""
          MODIFIED_LIST=""
          DELETED_LIST=""
          A_COUNT=0; M_COUNT=0; D_COUNT=0

          while IFS=$'\t' read -r status file rest; do
            [ -z "$file" ] && continue
            if is_skipped "$file"; then continue; fi
            pretty=$(format_path "$file")
            case "$status" in
              A)
                ADDED_LIST="${ADDED_LIST}• ${pretty}\n"
                A_COUNT=$((A_COUNT + 1))
                ;;
              M)
                MODIFIED_LIST="${MODIFIED_LIST}• ${pretty}\n"
                M_COUNT=$((M_COUNT + 1))
                ;;
              D)
                DELETED_LIST="${DELETED_LIST}• ${pretty}\n"
                D_COUNT=$((D_COUNT + 1))
                ;;
              R*)
                MODIFIED_LIST="${MODIFIED_LIST}• ${pretty} _(rinominato)_\n"
                M_COUNT=$((M_COUNT + 1))
                ;;
            esac
          done < <(git diff-tree --no-commit-id --name-status -r HEAD || true)

          TOTAL=$((A_COUNT + M_COUNT + D_COUNT))

          # Se non c'è niente di significativo, non mandare il messaggio
          if [ "$TOTAL" -eq 0 ]; then
            echo "Nessun file rilevante modificato, salto la notifica."
            exit 0
          fi

          # ============================================================
          # Determina tipo principale, colore e icona
          # ============================================================
          if [ "$A_COUNT" -gt 0 ] && [ "$M_COUNT" -eq 0 ] && [ "$D_COUNT" -eq 0 ]; then
            COLOR=3066993; ICON="🆕"; TYPE="Nuova Pubblicazione"
          elif [ "$M_COUNT" -gt 0 ] && [ "$A_COUNT" -eq 0 ] && [ "$D_COUNT" -eq 0 ]; then
            COLOR=15844367; ICON="✏️"; TYPE="Modifica"
          elif [ "$D_COUNT" -gt 0 ] && [ "$A_COUNT" -eq 0 ] && [ "$M_COUNT" -eq 0 ]; then
            COLOR=15158332; ICON="❌"; TYPE="Abrogazione"
          else
            COLOR=3447003; ICON="📜"; TYPE="Aggiornamento"
          fi

          # ============================================================
          # Costruisci la descrizione a sezioni
          # ============================================================
          DESCRIPTION=""

          if [ "$SUBJECT" != "No subject" ] && [ -n "$SUBJECT" ]; then
            DESCRIPTION="**${SUBJECT}**\n\n"
          fi

          if [ "$A_COUNT" -gt 0 ]; then
            DESCRIPTION="${DESCRIPTION}🆕 **Aggiunto:**\n${ADDED_LIST}\n"
          fi
          if [ "$M_COUNT" -gt 0 ]; then
            DESCRIPTION="${DESCRIPTION}✏️ **Modificato:**\n${MODIFIED_LIST}\n"
          fi
          if [ "$D_COUNT" -gt 0 ]; then
            DESCRIPTION="${DESCRIPTION}❌ **Rimosso:**\n${DELETED_LIST}\n"
          fi

          DESCRIPTION=$(echo -e "$DESCRIPTION")

          # ============================================================
          # Invia a Discord
          # ============================================================
          PAYLOAD=$(jq -n \
            --arg title "$ICON $TYPE" \
            --arg desc "$DESCRIPTION" \
            --arg url "$COMMIT_URL" \
            --arg author "$COMMIT_AUTHOR" \
            --arg footer "Codice Legislativo • Governo Enveart RP" \
            --argjson color "$COLOR" \
            '{
              username: "Gazzetta Ufficiale",
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                url: $url,
                author: { name: $author },
                footer: { text: $footer },
                timestamp: now | todate
              }]
            }')

          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK"
