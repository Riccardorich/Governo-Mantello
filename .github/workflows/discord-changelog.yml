name: Discord Changelog

on:
  push:
    branches:
      - main

env:
  # URL pubblico del sito GitBook (cambialo qui se rinomini lo space)
  GITBOOK_URL: "https://governo-rp.gitbook.io/untitled"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build Discord payload
        env:
          GITBOOK_URL: ${{ env.GITBOOK_URL }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PYEOF' > payload.json
          import subprocess, json, re, os, sys
          from datetime import datetime, timezone

          GITBOOK_URL = os.environ.get("GITBOOK_URL", "").rstrip("/")
          author = os.environ.get("COMMIT_AUTHOR", "Sconosciuto")
          raw_subject = os.environ.get("COMMIT_SUBJECT", "").splitlines()[0] if os.environ.get("COMMIT_SUBJECT") else ""
          subject = re.sub(r"^GITBOOK-\d+:\s*", "", raw_subject).strip()

          SKIP_FILES = {"SUMMARY.md", "README.md", ".gitbook.yaml", ".gitignore"}

          # ----------------------------------------------------------------
          # 1) Recupera la lista file con stato Git (A/M/D/R)
          # ----------------------------------------------------------------
          diff_out = subprocess.run(
              ["git", "diff-tree", "--no-commit-id", "--name-status", "-r", "HEAD"],
              capture_output=True, text=True
          ).stdout

          added, modified, deleted = [], [], []
          for line in diff_out.splitlines():
              parts = line.split("\t")
              if len(parts) < 2: continue
              status, f = parts[0], parts[1]
              if not f.endswith(".md"): continue
              if os.path.basename(f) in SKIP_FILES: continue
              if f.startswith("."): continue
              if status.startswith("A"): added.append(f)
              elif status.startswith("M"): modified.append(f)
              elif status.startswith("D"): deleted.append(f)
              elif status.startswith("R"):
                  modified.append(parts[2] if len(parts) > 2 else f)

          if not (added or modified or deleted):
              print(json.dumps({"skip": True}))
              sys.exit(0)

          # ----------------------------------------------------------------
          # 2) Helper: trasforma path file in nome leggibile + URL GitBook
          # ----------------------------------------------------------------
          def prettify(s):
              # rimuove prefissi "1.-", "2.-", ecc. e mette spazi al posto dei trattini
              s = re.sub(r"^[0-9]+\.?-?", "", s)
              s = s.replace("-", " ").replace("_", " ")
              # capitalizza prima lettera di ogni parola
              return " ".join(w.capitalize() for w in s.split())

          def format_path(path):
              clean = path[:-3] if path.endswith(".md") else path
              parts = clean.split("/")
              if len(parts) > 1:
                  filename = parts[-1]
                  folder = " / ".join(prettify(p) for p in parts[:-1])
                  pretty = f"{prettify(filename)} _({folder})_"
              else:
                  pretty = prettify(clean)
              url = f"{GITBOOK_URL}/{clean}"
              return pretty, url

          # ----------------------------------------------------------------
          # 3) Helper: trova quali ## Art. X sono stati modificati nel file
          # ----------------------------------------------------------------
          def get_changed_sections(file):
              try:
                  diff = subprocess.run(
                      ["git", "diff", "HEAD~1", "HEAD", "--unified=0", "--", file],
                      capture_output=True, text=True
                  ).stdout
                  content = subprocess.run(
                      ["git", "show", f"HEAD:{file}"],
                      capture_output=True, text=True
                  ).stdout
              except Exception:
                  return []

              # Mappa: numero_riga -> header più vicino sopra
              section_map, current = {}, None
              for i, line in enumerate(content.split("\n"), start=1):
                  m = re.match(r"^#{1,4}\s+(.+?)\s*$", line)
                  if m:
                      current = m.group(1).strip()
                  section_map[i] = current

              sections = []
              for hunk in re.finditer(r"@@\s+-\d+(?:,\d+)?\s+\+(\d+)(?:,(\d+))?\s+@@", diff):
                  start = int(hunk.group(1))
                  count = int(hunk.group(2) or 1)
                  if count == 0: continue
                  for ln in range(start, start + count + 1):
                      sec = section_map.get(ln)
                      if sec and sec not in sections:
                          sections.append(sec)
              return sections

          # ----------------------------------------------------------------
          # 4) Costruisci la descrizione a sezioni
          # ----------------------------------------------------------------
          lines = []
          if subject and subject.lower() != "no subject":
              lines.append(f"**{subject}**\n")

          def add_section(emoji, label, files, with_sections=False):
              if not files: return
              lines.append(f"{emoji} **{label}:**")
              for f in files:
                  pretty, url = format_path(f)
                  lines.append(f"• [{pretty}]({url})")
                  if with_sections:
                      secs = get_changed_sections(f)
                      for s in secs[:3]:
                          lines.append(f"   ↳ _{s}_")
                      if len(secs) > 3:
                          lines.append(f"   ↳ _...e altri {len(secs)-3} paragrafi_")
              lines.append("")

          add_section("🆕", "Aggiunto", added, with_sections=False)
          add_section("✏️", "Modificato", modified, with_sections=True)
          add_section("❌", "Rimosso", deleted, with_sections=False)

          description = "\n".join(lines).strip()
          if len(description) > 4000:
              description = description[:3990] + "\n_..._"

          # ----------------------------------------------------------------
          # 5) Tipo / colore / icona principali
          # ----------------------------------------------------------------
          if added and not modified and not deleted:
              color, icon, type_name = 3066993, "🆕", "Nuova Pubblicazione"
          elif modified and not added and not deleted:
              color, icon, type_name = 15844367, "✏️", "Modifica"
          elif deleted and not added and not modified:
              color, icon, type_name = 15158332, "❌", "Abrogazione"
          else:
              color, icon, type_name = 3447003, "📜", "Aggiornamento"

          # ----------------------------------------------------------------
          # 6) Payload finale
          # ----------------------------------------------------------------
          payload = {
              "username": "Gazzetta Ufficiale",
              "embeds": [{
                  "title": f"{icon} {type_name}",
                  "url": GITBOOK_URL,
                  "description": description,
                  "color": color,
                  "author": {"name": author},
                  "footer": {"text": "Codice Legislativo • Governo Enveart RP"},
                  "timestamp": datetime.now(timezone.utc).isoformat()
              }]
          }
          print(json.dumps(payload))
          PYEOF

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if jq -e '.skip' payload.json > /dev/null 2>&1; then
            echo "Nessun file rilevante, skip notifica"
            exit 0
          fi
          curl -X POST -H "Content-Type: application/json" \
            -d @payload.json "$DISCORD_WEBHOOK"
