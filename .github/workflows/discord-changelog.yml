name: Discord Changelog

# Si attiva ogni volta che viene fatto un push sul branch main
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build and send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -e

          # ============================================================
          # STEP 1 — Estrai dati dal commit
          # ============================================================
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"

          # Prima riga del commit (subject)
          SUBJECT=$(echo "$COMMIT_MSG" | head -n 1)

          # Pulisce prefissi automatici di GitBook tipo "GITBOOK-67:"
          SUBJECT_CLEAN=$(echo "$SUBJECT" | sed -E 's/^GITBOOK-[0-9]+:\s*//')

          # ============================================================
          # STEP 2 — Recupera i file cambiati nel commit
          # ============================================================
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD || true)

          # Formatta ogni file in un nome leggibile in italiano
          # Es: "2.-attivita-commerciali/legge-2.10.md" -> "Legge 2.10 (Attivita Commerciali)"
          FORMATTED_FILES=""
          FILE_COUNT=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.md ]] && continue
            FILE_COUNT=$((FILE_COUNT + 1))

            # Rimuove estensione .md
            name="${file%.md}"

            # Estrae cartella e nome file
            if [[ "$name" == *"/"* ]]; then
              folder="${name%/*}"
              filename="${name##*/}"
              # Rimuove prefissi numerici tipo "2.-" o "3.-"
              folder_clean=$(echo "$folder" | sed -E 's/^[0-9]+\.-//; s/-/ /g')
              file_clean=$(echo "$filename" | sed -E 's/-/ /g')
              # Capitalizza la prima lettera di ogni parola (fallback semplice)
              folder_pretty=$(echo "$folder_clean" | sed -E 's/\b(.)/\u\1/g')
              file_pretty=$(echo "$file_clean" | sed -E 's/\b(.)/\u\1/g')
              FORMATTED_FILES="${FORMATTED_FILES}• **${file_pretty}** _(${folder_pretty})_\n"
            else
              file_clean=$(echo "$name" | sed -E 's/-/ /g; s/\b(.)/\u\1/g')
              FORMATTED_FILES="${FORMATTED_FILES}• **${file_clean}**\n"
            fi
          done <<< "$CHANGED_FILES"

          # Limita la lista a 5 file (se ce ne sono di più)
          if [ "$FILE_COUNT" -gt 5 ]; then
            FORMATTED_FILES=$(echo -e "$FORMATTED_FILES" | head -n 5)
            FORMATTED_FILES="${FORMATTED_FILES}\n_...e altri $((FILE_COUNT - 5)) file modificati_"
          fi

          # ============================================================
          # STEP 3 — Determina tipo, colore, icona dal subject (o auto)
          # ============================================================
          COLOR=3447003       # Blu (default)
          ICON="📜"
          TYPE="Aggiornamento"

          # Se il subject è generico, prova a inferire dal nome dei file
          INFER_TEXT="$SUBJECT_CLEAN"
          if [ "$SUBJECT_CLEAN" = "No subject" ] || [ -z "$SUBJECT_CLEAN" ]; then
            INFER_TEXT="$CHANGED_FILES"
          fi

          if echo "$INFER_TEXT" | grep -iE "(aggiunt|nuov|pubblicat|introd|crea)" > /dev/null; then
            COLOR=3066993     # Verde
            ICON="🆕"
            TYPE="Nuova Pubblicazione"
          elif echo "$INFER_TEXT" | grep -iE "(modifi|aggiorn|edit|emendament|cambia|revis)" > /dev/null; then
            COLOR=15844367    # Giallo
            ICON="✏️"
            TYPE="Modifica"
          elif echo "$INFER_TEXT" | grep -iE "(abrog|elimin|rimoss|cancellat|rimuov)" > /dev/null; then
            COLOR=15158332    # Rosso
            ICON="❌"
            TYPE="Abrogazione"
          fi

          # ============================================================
          # STEP 4 — Costruisci la descrizione finale
          # ============================================================
          if [ "$SUBJECT_CLEAN" = "No subject" ] || [ -z "$SUBJECT_CLEAN" ]; then
            # Niente subject: usa solo la lista file
            if [ "$FILE_COUNT" -eq 0 ]; then
              DESCRIPTION="_Aggiornamento generico al codice legislativo_"
            else
              DESCRIPTION=$(echo -e "$FORMATTED_FILES")
            fi
          else
            # C'è un subject sensato: mostralo + lista file
            if [ "$FILE_COUNT" -eq 0 ]; then
              DESCRIPTION="**${SUBJECT_CLEAN}**"
            else
              DESCRIPTION=$(echo -e "**${SUBJECT_CLEAN}**\n\n${FORMATTED_FILES}")
            fi
          fi

          # ============================================================
          # STEP 5 — Invia a Discord
          # ============================================================
          PAYLOAD=$(jq -n \
            --arg title "$ICON $TYPE" \
            --arg desc "$DESCRIPTION" \
            --arg url "$COMMIT_URL" \
            --arg author "$COMMIT_AUTHOR" \
            --arg footer "Codice Legislativo • Governo Enveart RP" \
            --argjson color "$COLOR" \
            '{
              username: "Gazzetta Ufficiale",
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                url: $url,
                author: { name: $author },
                footer: { text: $footer },
                timestamp: now | todate
              }]
            }')

          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK"
